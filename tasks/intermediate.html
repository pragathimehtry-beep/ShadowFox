<!DOCTYPE html>
<html>
<head>
    <!-- NEW FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        /* LEFT & RIGHT ALIGNMENT */
        .top-buttons {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;

            width: 80%;
            max-width: 750px;
        }

        /* ROUNDED CARD BUTTON */
        .btn {
            width: 300px;
            height: 180px;
            border: none;
            cursor: pointer;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 25px;

            position: relative;
            overflow: hidden;

            display: flex;
            align-items: center;
            justify-content: center;

            background-size: cover;
            background-position: center;

            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* HOVER LIFT EFFECT */
        .btn:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* DARK OVERLAY */
        .btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            transition: 0.3s;
        }

        .btn:hover::before {
            background: rgba(0,0,0,0.6);
        }

        /* UPDATED TEXT STYLE */
        .btn span {
            position: relative;
            z-index: 1;
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            font-size: 28px;
        }

        /* IMAGES */
        .women {
            background-image: url("https://i.pinimg.com/1200x/8c/74/43/8c744378fb4c77d622f5cd0c0dd53b98.jpg");
        }

        .men {
            background-image: url("https://i.pinimg.com/1200x/6d/be/cf/6dbecf24c3c786b0973d877a32fc992a.jpg");
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            .top-buttons {
                flex-direction: column;
                gap: 20px;
            }
        }

    </style>
</head>
<body>

<div class="container">

    <div class="top-buttons">

        <button class="btn women">
            <span>Women's RCB Team</span>
        </button>

        <button class="btn men">
            <span>Men's RCB Team</span>
        </button>

    </div>

</div>

</body>
</html>
