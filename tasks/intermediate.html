<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        .top-buttons {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            backdrop-filter: blur(8px);
        }

        .dropdown {
            flex: 1;
            position: relative;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            background: rgba(200, 0, 0, 0.9);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(150, 0, 0, 1);
        }

        .content {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%) scaleY(0);
            transform-origin: top;
            width: 80%;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
            opacity: 0;
        }

        .content.show {
            transform: translateX(-50%) scaleY(1);
            opacity: 1;
        }

        .content img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-buttons">

        <div class="dropdown">
            <button class="btn" onclick="toggleDropdown('leftContent')">
                Women's RCB Team
            </button>
            <div id="leftContent" class="content">
                <img src="https://i.pinimg.com/1200x/8c/74/43/8c744378fb4c77d622f5cd0c0dd53b98.jpg">
            </div>
        </div>

        <div class="dropdown">
            <button class="btn" onclick="toggleDropdown('rightContent')">
                Men's RCB Team
            </button>
            <div id="rightContent" class="content">
                <img src="https://i.pinimg.com/1200x/6d/be/cf/6dbecf24c3c786b0973d877a32fc992a.jpg">
            </div>
        </div>

    </div>

</div>

<script>
    function toggleDropdown(id) {
        let content = document.getElementById(id);

        // close all dropdowns first
        document.querySelectorAll('.content').forEach(c => {
            if (c.id !== id) c.classList.remove('show');
        });

        // toggle selected
        content.classList.toggle('show');
    }
</script>

</body>
</html>
