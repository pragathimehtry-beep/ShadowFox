<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* BACKGROUND */
.container {
    height: 100vh;
    background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
    background-size: cover;
    background-position: center;
    position: relative;
}

/* MENU */
.menu-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 32px;
    color: #ff1a1a;
    cursor: pointer;
    z-index: 1000;
}

.sidebar {
    position: fixed;
    top: 0;
    left: -280px;
    width: 280px;
    height: 100%;
    background: linear-gradient(180deg, #990000, #1a0000);
    padding-top: 60px;
    transition: 0.4s;
}

.sidebar a {
    display: block;
    padding: 16px 25px;
    color: white;
    text-decoration: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    cursor: pointer;
}

.sidebar.active {
    left: 0;
}

/* BUTTONS */
.top-buttons {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 40px;
}

.btn {
    width: 300px;
    height: 180px;
    border: none;
    border-radius: 25px;
    color: white;
    font-family: 'Bebas Neue';
    font-size: 28px;
    cursor: pointer;
    background-size: cover;
    background-position: center;
}

.women {
    background-image: url("https://i.pinimg.com/1200x/8c/74/43/8c744378fb4c77d622f5cd0c0dd53b98.jpg");
}

.men {
    background-image: url("https://i.pinimg.com/1200x/6d/be/cf/6dbecf24c3c786b0973d877a32fc992a.jpg");
}

/* CONTENT BOX */
.content-box {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 800px;
    padding: 20px;
    background: rgba(0,0,0,0.7);
    color: white;
    border-radius: 15px;
    display: none;
}

</style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="sidebar" class="sidebar">
    <a onclick="showContent('history')">Team History</a>
    <a onclick="showContent('founded')">Year Founded</a>
    <a onclick="showContent('titles')">Titles</a>
    <a onclick="showContent('players')">Players</a>
</div>

<div class="container">

    <!-- ✅ BUTTONS BACK -->
    <div class="top-buttons">
        <button class="btn women">Women's RCB</button>
        <button class="btn men">Men's RCB</button>
    </div>

    <!-- ✅ CONTENT INSIDE CONTAINER -->
    <div id="contentBox" class="content-box">
        <h2 id="contentTitle"></h2>
        <p id="contentText"></p>
    </div>

</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}

function showContent(section) {
    const box = document.getElementById("contentBox");
    const title = document.getElementById("contentTitle");
    const text = document.getElementById("contentText");

    box.style.display = "block";

    if(section === "history") {
        title.innerText = "RCB History";
        text.innerText = "RCB is one of the most popular IPL teams since 2008.";
    }

    if(section === "founded") {
        title.innerText = "Founded";
        text.innerText = "RCB was founded in 2008.";
    }

    if(section === "titles") {
        title.innerText = "Titles";
        text.innerText = "RCB reached finals 3 times but hasn't won yet.";
    }

    if(section === "players") {
        title.innerText = "Players";
        text.innerText = "Virat Kohli, AB de Villiers, Chris Gayle.";
    }
}
</script>

</body>
</html>
