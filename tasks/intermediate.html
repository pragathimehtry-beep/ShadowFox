<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        /* CENTERED STACK */
        .top-buttons {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            width: 260px;
            gap: 15px;
        }

        .dropdown {
            width: 100%;
            text-align: center;
        }

        .btn {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            background: rgba(200, 0, 0, 0.9);
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: rgba(150, 0, 0, 1);
        }

        /* IMAGE STYLE */
        .content {
            display: none;
            margin-top: 10px;
        }

        .content img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
        }

        .content.show {
            display: block;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="top-buttons">

        <div class="dropdown">
            <button class="btn" onclick="toggleImage('leftContent')">
                Women's RCB Team
            </button>
            <div id="leftContent" class="content">
                <img src="https://i.pinimg.com/1200x/8c/74/43/8c744378fb4c77d622f5cd0c0dd53b98.jpg">
            </div>
        </div>

        <div class="dropdown">
            <button class="btn" onclick="toggleImage('rightContent')">
                Men's RCB Team
            </button>
            <div id="rightContent" class="content">
                <img src="https://i.pinimg.com/1200x/6d/be/cf/6dbecf24c3c786b0973d877a32fc992a.jpg">
            </div>
        </div>

    </div>

</div>

<script>
    function toggleImage(id) {
        let img = document.getElementById(id);

        // hide others
        document.querySelectorAll('.content').forEach(c => {
            if (c.id !== id) c.classList.remove('show');
        });

        // toggle selected
        img.classList.toggle('show');
    }
</script>

</body>
</html>
