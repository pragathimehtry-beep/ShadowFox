<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* BACKGROUND */
        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        /* MENU BUTTON */
        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: #ff1a1a; /* RED ICON */
            cursor: pointer;
            z-index: 1000;
        }

        /* SIDEBAR MENU (RED THEME) */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #990000, #1a0000);
            padding-top: 60px;
            transition: 0.4s;
            box-shadow: 5px 0 20px rgba(0,0,0,0.6);
        }

        .sidebar a {
            display: block;
            padding: 16px 25px;
            color: white;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 1px;
            border-left: 4px solid transparent;
            transition: 0.3s;
        }

        /* HOVER EFFECT */
        .sidebar a:hover {
            background: rgba(255,0,0,0.3);
            border-left: 4px solid #ff1a1a;
            padding-left: 30px;
        }

        /* ACTIVE MENU */
        .sidebar.active {
            left: 0;
        }

        /* BUTTON LAYOUT */
        .top-buttons {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            display: flex;
            justify-content: space-between;
            align-items: center;

            width: 80%;
            max-width: 750px;
        }

        /* ROUNDED CARD BUTTON */
        .btn {
            width: 300px;
            height: 180px;
            border: none;
            cursor: pointer;
            color: white;
            border-radius: 25px;

            display: flex;
            align-items: center;
            justify-content: center;

            background-size: cover;
            background-position: center;

            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;

            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
        }

        .btn span {
            position: relative;
            z-index: 1;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 2px;
        }

        .women {
            background-image: url("https://i.pinimg.com/1200x/8c/74/43/8c744378fb4c77d622f5cd0c0dd53b98.jpg");
        }

        .men {
            background-image: url("https://i.pinimg.com/1200x/6d/be/cf/6dbecf24c3c786b0973d877a32fc992a.jpg");
        }

        /* MOBILE */
        @media (max-width: 600px) {
            .top-buttons {
                flex-direction: column;
                gap: 20px;
            }
        }
    .content-box {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    
    width: 80%;
    max-width: 800px;
    padding: 20px;

    background: rgba(0,0,0,0.7);
    color: white;

    border-radius: 15px;
    text-align: center;

    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
    </style>
</head>

<body>

<!-- MENU ICON -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" onclick="showContent('history')">Team History & Legacy</a>
    <a href="#" onclick="showContent('founded')">Year Founded</a>
    <a href="#" onclick="showContent('titles')">IPL Titles & Achievements</a>
    <a href="#" onclick="showContent('players')">Legendary Players</a>
</div>
<div class="container">

    <div class="top-buttons">
       
        <a href="https://pragathimehtry-beep.github.io/ShadowFox/tasks/women's_RCB_team">
        <button class="btn women">
        <span>Women's RCB Team</span>
    </button>
</a>
         <a href="https://pragathimehtry-beep.github.io/ShadowFox/tasks/men's_RCB_team">
        <button class="btn men">
            <span>Men's RCB Team</span>
        </button>
         </a>
    </div>
<div id="contentBox" class="content-box">
    <h2 id="contentTitle">Welcome</h2>
    <p id="contentText">Click a menu item to see details.</p>
</div>
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}

    function showContent(section) {
    let title = document.getElementById("contentTitle");
    let text = document.getElementById("contentText");

    if (section === "history") {
        title.innerText = "RCB Team History & Legacy";
        text.innerText = "Royal Challengers Bangalore is one of the most popular IPL teams known for its loyal fan base and iconic players.";
    }

    else if (section === "founded") {
        title.innerText = "Year Founded";
        text.innerText = "RCB was founded in 2008 when the IPL started.";
    }

    else if (section === "titles") {
        title.innerText = "IPL Titles & Achievements";
        text.innerText = "RCB has reached the finals multiple times but is still chasing its first IPL trophy.";
    }

    else if (section === "players") {
        title.innerText = "Legendary Players";
        text.innerText = "Some legends include Virat Kohli, AB de Villiers, and Chris Gayle.";
    }

    document.getElementById("sidebar").classList.remove("active");
}
    // OPTIONAL: close sidebar after click
    document.getElementById("sidebar").classList.remove("active");
</script>

</body>
</html>
