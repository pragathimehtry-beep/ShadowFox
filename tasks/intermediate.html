<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
        }

        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        .top-buttons {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
        }

        .btn {
            flex: 1; /* each button takes half width */
            padding: 15px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            background: red;
            color: white;
        }

        .btn:hover {
            background: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-buttons">
        <button class="btn">Left Button</button>
        <button class="btn">Right Button</button>
    </div>

</div>

</body>
</html>
