<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: #ff1a1a;
            cursor: pointer;
            z-index: 1001;
            background: rgba(0,0,0,0.5);
            padding: 5px 12px;
            border-radius: 8px;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #990000, #1a0000);
            padding-top: 60px;
            transition: 0.4s;
            z-index: 1000;
            overflow-y: auto;
        }

        .sidebar a {
            display: block;
            padding: 16px 25px;
            color: white;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            cursor: pointer;
        }

        .sidebar a:hover {
            background: rgba(255,0,0,0.3);
        }

        .sidebar.active {
            left: 0;
        }

        /* CONTENT BOX */
        .content-box {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            padding: 20px;
            background: rgba(0,0,0,0.85);
            color: white;
            border-radius: 15px;
            z-index: 1002;
            display: none;
        }

        .content-box h2 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
            margin: 0 0 10px 0;
        }

        .content-box p {
            margin: 0;
            line-height: 1.5;
        }

        .divider {
            height: 2px;
            background: rgba(255,255,255,0.2);
            margin: 10px 20px;
        }

        .section-label {
            padding: 10px 25px;
            color: #ffaaaa;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="sidebar" class="sidebar">
    <div class="section-label">🏏 MEN'S TEAM</div>
    <a onclick="showContent('history')">Team History & Legacy</a>
    <a onclick="showContent('founded')">Year Founded</a>
    <a onclick="showContent('titles')">IPL Titles & Achievements</a>
    <a onclick="showContent('players')">Legendary Players</a>
    
    <div class="divider"></div>
    
    <div class="section-label">🌸 WOMEN'S TEAM (RCBW)</div>
    <a onclick="showContent('womens_history')">RCBW Team History</a>
    <a onclick="showContent('womens_founded')">RCBW Year Founded</a>
    <a onclick="showContent('womens_titles')">WPL Titles & Achievements</a>
    <a onclick="showContent('womens_players')">RCBW Star Players</a>
</div>

<div class="container"></div>

<!-- CONTENT DISPLAY -->
<div id="contentBox" class="content-box">
    <h2 id="contentTitle"></h2>
    <p id="contentText"></p>
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}

function showContent(section) {
    const box = document.getElementById("contentBox");
    const title = document.getElementById("contentTitle");
    const text = document.getElementById("contentText");

    box.style.display = "block";

    // MEN'S TEAM CONTENT
    if(section === "history") {
        title.innerText = "RCB Team History & Legacy";
        text.innerText = "Royal Challengers Bangalore (RCB) is one of the most popular IPL teams, known for its passionate fanbase and exciting matches since the league began in 2008.";
    }

    if(section === "founded") {
        title.innerText = "Year Founded";
        text.innerText = "RCB was founded in 2008 as one of the original IPL franchises.";
    }

    if(section === "titles") {
        title.innerText = "IPL Titles & Achievements";
        text.innerText = "RCB has reached the IPL finals three times (2009, 2011, 2016) but is yet to win a title. Despite this, they hold multiple batting records.";
    }

    if(section === "players") {
        title.innerText = "Legendary Players";
        text.innerText = "RCB legends include Virat Kohli, AB de Villiers, Chris Gayle, and Anil Kumble.";
    }

    // WOMEN'S TEAM CONTENT (RCB Women)
    if(section === "womens_history") {
        title.innerText = "RCB Women's Team History";
        text.innerText = "Royal Challengers Bangalore Women (RCBW) was established in 2023 as part of the Women's Premier League (WPL). The team represents Bangalore in the WPL and has quickly gained a massive fan following, known for their fighting spirit and talented roster.";
    }

    if(section === "womens_founded") {
        title.innerText = "RCBW Year Founded";
        text.innerText = "The RCB Women's team was founded in 2023, when the Women's Premier League (WPL) was inaugurated by the BCCI. RCB was one of the five original franchises in the WPL.";
    }

    if(section === "womens_titles") {
        title.innerText = "WPL Titles & Achievements";
        text.innerText = "RCB Women made history by winning their maiden WPL title in 2024, defeating Delhi Capitals in the final. This was a landmark achievement for the franchise, bringing the first-ever trophy to the RCB family. They have established themselves as one of the most competitive teams in the league.";
    }

    if(section === "womens_players") {
        title.innerText = "RCBW Star Players";
        text.innerText = "RCB Women feature incredible talents like Smriti Mandhana (captain), Ellyse Perry, Sophie Devine, Richa Ghosh, Renuka Singh, Shreyanka Patil, and Asha Sobhana. These players have delivered match-winning performances and brought glory to the franchise.";
    }

    // Auto close sidebar after clicking for better mobile experience
    const sidebar = document.getElementById("sidebar");
    if(sidebar.classList.contains("active")) {
        sidebar.classList.remove("active");
    }
}
</script>

</body>
</html>
