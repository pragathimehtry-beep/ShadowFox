<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
        }

        .container {
            height: 100vh;
            display: flex;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        .btn {
            flex: 1; /* each takes 50% width */
            height: 100vh;
            border: none;
            font-size: 24px;
            color: white;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4); /* transparent overlay */
        }

        .btn:hover {
            background: rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>

<div class="container">
    <button class="btn">Left Button</button>
    <button class="btn">Right Button</button>
</div>

</body>
</html>
