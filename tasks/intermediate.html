<html>
  <head>
        <style>
        .top-buttons {
            position: fixed;   /* keeps buttons at top even when scrolling */
            top: 0;
            left: 0;
            width: 100%;
            background-color: #f1f1f1;
            padding: 10px;
            text-align: right; /* aligns buttons to the right */
        }

        .top-buttons button {
            margin-left: 10px;
            padding: 8px 15px;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
  </head>
  <body>
    <div style="background-color: red; height: 100vh; display: flex; justify-content: center; align-items: center;">
    
    <img src="https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg"
         alt="My Image"
         style="height:100vh; width: 500px;">

</div>
  </body>
</html>
