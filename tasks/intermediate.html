<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
        }

        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        .top-buttons {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
        }

        .dropdown {
            flex: 1;
            position: relative;
        }

        .btn {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            border: none;
            cursor: pointer;
            background: red;
            color: white;
        }

        .content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px;
            box-sizing: border-box;
        }

        .content p {
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="top-buttons">

        <div class="dropdown">
            <button class="btn" onclick="toggleDropdown('leftContent')">
                Left Button
            </button>
            <div id="leftContent" class="content">
               <img src="https://i.pinimg.com/1200x/8c/74/43/8c744378fb4c77d622f5cd0c0dd53b98.jpg" alt="Girl in a jacket" width="100" height="300">
            </div>
        </div>

        <div class="dropdown">
            <button class="btn" onclick="toggleDropdown('rightContent')">
                Right Button
            </button>
            <div id="rightContent" class="content">
                <img src="https://i.pinimg.com/1200x/38/2f/f0/382ff01c35866b34f83af01d8fb29c14.jpg" alt="Girl in a jacket" width="100" height="300">
            </div>
        </div>

    </div>

</div>

<script>
    function toggleDropdown(id) {
        let content = document.getElementById(id);

        if (content.style.display === "block") {
            content.style.display = "none";
        } else {
            content.style.display = "block";
        }
    }
</script>

</body>
</html>
