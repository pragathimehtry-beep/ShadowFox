<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .container {
            height: 100vh;
            background-image: url("https://i.pinimg.com/1200x/c0/94/74/c09474b75f4e360d0a0ba251ba9d28b0.jpg");
            background-size: cover;
            background-position: center;
        }

        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: #ff1a1a;
            cursor: pointer;
            z-index: 1000;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #990000, #1a0000);
            padding-top: 60px;
            transition: 0.4s;
        }

        .sidebar a {
            display: block;
            padding: 16px 25px;
            color: white;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            cursor: pointer;
        }

        .sidebar a:hover {
            background: rgba(255,0,0,0.3);
        }

        .sidebar.active {
            left: 0;
        }

        /* CONTENT BOX */
        .content-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 800px;
            padding: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border-radius: 15px;
            display: none;
        }

        .content-box h2 {
            font-family: 'Bebas Neue', sans-serif;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="sidebar" class="sidebar">
    <a onclick="showContent('history')">Team History & Legacy</a>
    <a onclick="showContent('founded')">Year Founded</a>
    <a onclick="showContent('titles')">IPL Titles & Achievements</a>
    <a onclick="showContent('players')">Legendary Players</a>
</div>

<div class="container"></div>

<!-- CONTENT DISPLAY -->
<div id="contentBox" class="content-box">
    <h2 id="contentTitle"></h2>
    <p id="contentText"></p>
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}

function showContent(section) {
    const box = document.getElementById("contentBox");
    const title = document.getElementById("contentTitle");
    const text = document.getElementById("contentText");

    box.style.display = "block";

    if(section === "history") {
        title.innerText = "RCB Team History & Legacy";
        text.innerText = "Royal Challengers Bangalore (RCB) is one of the most popular IPL teams, known for its passionate fanbase and exciting matches since the league began in 2008.";
    }

    if(section === "founded") {
        title.innerText = "Year Founded";
        text.innerText = "RCB was founded in 2008 as one of the original IPL franchises.";
    }

    if(section === "titles") {
        title.innerText = "IPL Titles & Achievements";
        text.innerText = "RCB has reached the IPL finals three times (2009, 2011, 2016) but is yet to win a title. Despite this, they hold multiple batting records.";
    }

    if(section === "players") {
        title.innerText = "Legendary Players";
        text.innerText = "RCB legends include Virat Kohli, AB de Villiers, Chris Gayle, and Anil Kumble.";
    }
}
</script>

</body>
</html>
