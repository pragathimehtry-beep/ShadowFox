<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* BACKGROUND */
        .container {
            height: 100vh;
            background-image: url("https://www.shutterstock.com/image-photo/semi-top-view-rounded-full-600nw-2594552419.jpg");
            background-size: cover;
            background-position: center;
        }

        /* MENU BUTTON */
        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: red;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #990000, #1a0000);
            padding-top: 60px;
            transition: 0.4s;
        }

        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
        }

        .sidebar a:hover {
            background: rgba(255,0,0,0.3);
        }

        .sidebar.active {
            left: 0;
        }

        /* HIDE SECTIONS */
        .hidden {
            display: none;
        }

        /* SCHEDULE BOX */
        .schedule-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            background: rgba(0,0,0,0.8);
            padding: 25px;
            border-radius: 15px;
            color: white;
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        .schedule-box h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            cursor: pointer;
        }

        tr:hover {
            background: rgba(255,0,0,0.3);
        }

        th, td {
            padding: 10px;
        }

        th {
            color: red;
        }

        .live {
            color: lime;
            font-weight: bold;
        }

        .details-box {
            margin-top: 15px;
        }
        .player-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    background: rgba(0,0,0,0.85);
    padding: 20px;
    border-radius: 15px;
    color: white;
    width: 90%;
    max-width: 800px;
    text-align: center;
}

.player-box h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
}

/* PLAYER GRID */
.players {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    width: 150px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    background: rgba(255,0,0,0.3);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.card h3 {
    margin-top: 10px;
}
    </style>
</head>

<body>

<!-- MENU BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" onclick="showSection('schedule')">Match Schedule</a>
    <a href="javascript:void(0)" onclick="showSection('players')">Current Players</a>
</div>

<div class="container">

    <!-- MATCH SCHEDULE -->
    <div id="scheduleSection" class="schedule-box hidden">

        <h1>RCB Women's Schedule</h1>

        <table>
            <tr>
                <th>Date</th>
                <th>Match</th>
                <th>Status</th>
            </tr>

            <tr onclick="showDetails('Mumbai Indians', 'Bangalore', '7:30 PM')">
                <td>March 1</td>
                <td>vs MI</td>
                <td class="live">LIVE</td>
            </tr>

            <tr onclick="showDetails('Delhi Capitals', 'Delhi', '7:30 PM')">
                <td>March 5</td>
                <td>vs DC</td>
                <td>Upcoming</td>
            </tr>

            <tr onclick="showDetails('UP Warriorz', 'Lucknow', '7:30 PM')">
                <td>March 8</td>
                <td>vs UP</td>
                <td>Upcoming</td>
            </tr>
        </table>

        <div class="details-box">
            <p id="detailsText">Click a match to see details</p>
        </div>

    </div>
<!-- PLAYER SECTION -->
<div id="playerSection" class="player-box hidden">

    <h1>RCB Women's Players</h1>

    <div class="players">

        <div class="card" onclick="showPlayer('Smriti Mandhana', 'Captain & Batter')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Smriti_Mandhana.jpg">
            <h3>Smriti Mandhana</h3>
        </div>

        <div class="card" onclick="showPlayer('Ellyse Perry', 'All-Rounder')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Ellyse_Perry.jpg">
            <h3>Ellyse Perry</h3>
        </div>

        <div class="card" onclick="showPlayer('Richa Ghosh', 'Wicketkeeper')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Richa_Ghosh.jpg">
            <h3>Richa Ghosh</h3>
        </div>

    </div>

    <!-- PLAYER DETAILS -->
    <div class="details-box">
        <p id="playerDetails">Click a player to see details</p>
    </div>

</div>
</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}

function showSection(section) {

    // hide all sections
    document.getElementById("scheduleSection").classList.add("hidden");
    document.getElementById("playerSection").classList.add("hidden");

    // show selected section
    if (section === "schedule") {
        document.getElementById("scheduleSection").classList.remove("hidden");
    }

    if (section === "players") {
        document.getElementById("playerSection").classList.remove("hidden");
    }

    // close sidebar
    document.getElementById("sidebar").classList.remove("active");
}
function showDetails(team, venue, time) {
    document.getElementById("detailsText").innerText =
        "Opponent: " + team + " | Venue: " + venue + " | Time: " + time;
}

function showPlayer(name, role) {
    document.getElementById("playerDetails").innerText =
        name + " - " + role;
}
</script>

</body>
</html>
