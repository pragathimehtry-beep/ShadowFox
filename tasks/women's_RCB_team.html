<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* BACKGROUND */
        .container {
            height: 100vh;
            background-image: url("https://www.shutterstock.com/image-photo/semi-top-view-rounded-full-600nw-2594552419.jpg");
            background-size: cover;
            background-position: center;
        }

        /* MENU BUTTON */
        .menu-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 32px;
            color: red;
            cursor: pointer;
        }

        /* SIDEBAR */
        .sidebar {
            position: fixed;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: linear-gradient(180deg, #990000, #1a0000);
            padding-top: 60px;
            transition: 0.4s;
        }

        .sidebar a {
            display: block;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
        }

        .sidebar a:hover {
            background: rgba(255,0,0,0.3);
        }

        .sidebar.active {
            left: 0;
        }

        /* HIDE SECTIONS */
        .hidden {
            display: none;
        }

        /* SCHEDULE BOX */
        .schedule-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            
            background: rgba(0,0,0,0.8);
            padding: 25px;
            border-radius: 15px;
            color: white;
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        .schedule-box h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        tr {
            cursor: pointer;
        }

        tr:hover {
            background: rgba(255,0,0,0.3);
        }

        th, td {
            padding: 10px;
        }

        th {
            color: red;
        }

        .live {
            color: lime;
            font-weight: bold;
        }

        .details-box {
            margin-top: 15px;
        }

    </style>
</head>

<body>

<!-- MENU BUTTON -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" onclick="showSection('schedule')">Match Schedule</a>
</div>

<div class="container">

    <!-- MATCH SCHEDULE -->
    <div id="scheduleSection" class="schedule-box hidden">

        <h1>RCB Women's Schedule</h1>

        <table>
            <tr>
                <th>Date</th>
                <th>Match</th>
                <th>Status</th>
            </tr>

            <tr onclick="showDetails('Mumbai Indians', 'Bangalore', '7:30 PM')">
                <td>March 1</td>
                <td>vs MI</td>
                <td class="live">LIVE</td>
            </tr>

            <tr onclick="showDetails('Delhi Capitals', 'Delhi', '7:30 PM')">
                <td>March 5</td>
                <td>vs DC</td>
                <td>Upcoming</td>
            </tr>

            <tr onclick="showDetails('UP Warriorz', 'Lucknow', '7:30 PM')">
                <td>March 8</td>
                <td>vs UP</td>
                <td>Upcoming</td>
            </tr>
        </table>

        <div class="details-box">
            <p id="detailsText">Click a match to see details</p>
        </div>

    </div>

</div>

<script>
function toggleMenu() {
    document.getElementById("sidebar").classList.toggle("active");
}

function showSection(section) {
    // hide all
    document.getElementById("scheduleSection").classList.add("hidden");

    // show selected
    if (section === "schedule") {
        document.getElementById("scheduleSection").classList.remove("hidden");
    }

    // close menu
    document.getElementById("sidebar").classList.remove("active");
}

function showDetails(team, venue, time) {
    document.getElementById("detailsText").innerText =
        "Opponent: " + team + " | Venue: " + venue + " | Time: " + time;
}
</script>

</body>
</html>
